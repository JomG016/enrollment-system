<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CNHS Enrollment</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="enroll-modern.css"/>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="MINI.png" alt="CNHS Logo">
        <div>
          <h1>Online Enrollment</h1>
          <p> FOR CONTINUING STUDENTS</p>
        </div>
      </div>

      <div class="pills">
        <a class="pill" href="index.html">Home</a>
      </div>
    </div>

      <div class="card">
        <div class="cardHead">
          <div>
            <p class="title">Student Details</p>
            <p class="hint">Check the info before submitting</p>
          </div>
        </div>

        <div class="cardBody">
          <form id="enrollmentForm">
            <div class="formGrid">
              <div class="field">
                <div class="label">NAME</div>
                <input id="name" class="input" placeholder="e.g. SALAZAR, JOHANNES XENO" />
              </div>

              <div class="field">
                <div class="label">SEX</div>
                <input id="sex" class="input" placeholder="e.g. MALE" />
              </div>

              <div class="field">
                <div class="label">AGE</div>
                <input id="age" class="input" placeholder="e.g. 17" />
              </div>

              <div class="field">
                <div class="label">GRADE</div>
                <input id="grade" class="input" placeholder="e.g. 8" />
              </div>

              <div class="field">
                <div class="label">SECTION</div>
                <select id="section" class="input">
                <option value="">Select Section</option>
                </select>
              </div>

              <div class="field">
                <div class="label">LRN</div>
                <input id="lrn" class="input" placeholder="e.g. 888888888888" maxlength="12" />
              </div>
            </div>

            <hr class="hr"/>

            <div class="youRow">
              <div class="label">YOU ARE</div>

              <div class="dropWrap">
                <button id="dropdownToggle" class="dropBtn" type="button" aria-expanded="false"></button>

                <div id="dropdownMenu" class="dropdown-menu" role="menu">
                  <button class="dropdown-item" type="button">Incoming Grade 8 REGULAR</button>
                  <button class="dropdown-item" type="button">Incoming Grade 9 REGULAR</button>
                  <button class="dropdown-item" type="button">Incoming Grade 10 REGULAR</button>
                  <button class="dropdown-item" type="button">Incoming Grade 8 SP-ICT</button>
                  <button class="dropdown-item" type="button">Incoming Grade 9 SP-ICT</button>
                  <button class="dropdown-item" type="button">Incoming Grade 10 SP-ICT</button>
                  <button class="dropdown-item" type="button">Incoming Grade 12</button>
                </div>

                <input id="youAreInput" class="input" placeholder="Select from dropdown..." />
              </div>
            </div>

            <div class="actions">
              <button id="backBtn" class="btn danger" type="button">Back</button>
              <button id="submitBtn" class="btn submit" type="submit">Submit Enrollment</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="footer">© Carmen National High School • Enrollment System</div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="./8910.js"></script>
  
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
